name: Release Please

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # For the root package (path "."), release-please-action emits outputs
      # WITHOUT a path prefix — see setPathOutput in the action source.
      phai-cli-released: ${{ steps.release.outputs.release_created }}
      phai-cli-tag: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-assets:
    needs: release-please
    if: needs.release-please.outputs.phai-cli-released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            cross: false
          - runner: macos-14
            target: x86_64-apple-darwin
            cross: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.phai-cli-tag }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Add cross-compile target
        if: matrix.cross == true
        run: rustup target add ${{ matrix.target }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build web app
        working-directory: crates/phai-cli/web
        run: pnpm install --frozen-lockfile && pnpm build
      - name: Build
        run: cargo build --release --package phai-cli ${{ matrix.cross && format('--target {0}', matrix.target) || '' }}
      - name: Package and checksum
        run: |
          BIN_DIR=${{ matrix.cross && format('target/{0}/release', matrix.target) || 'target/release' }}
          cd "$BIN_DIR"
          tar czf phai-cli-${{ matrix.target }}.tar.gz phai
          shasum -a 256 phai-cli-${{ matrix.target }}.tar.gz \
            > phai-cli-${{ matrix.target }}.tar.gz.sha256
          mv phai-cli-${{ matrix.target }}.tar.gz \
             phai-cli-${{ matrix.target }}.tar.gz.sha256 \
             "${GITHUB_WORKSPACE}/"
      - name: Sign tarball (minisign)
        run: |
          brew install minisign
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          minisign -S -s minisign.key \
            -m phai-cli-${{ matrix.target }}.tar.gz \
            -x phai-cli-${{ matrix.target }}.tar.gz.minisig \
            -c "phai release ${{ needs.release-please.outputs.phai-cli-tag }}"
          rm -f minisign.key
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
      - name: Upload to release
        run: |
          gh release upload "${{ needs.release-please.outputs.phai-cli-tag }}" \
            phai-cli-${{ matrix.target }}.tar.gz \
            phai-cli-${{ matrix.target }}.tar.gz.sha256 \
            phai-cli-${{ matrix.target }}.tar.gz.minisig \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # Native macOS desktop shell (Pake/Tauri WKWebView) — ADR-0039. Runs once and
  # produces a universal (Intel + Apple Silicon) Phai.app, shipped as a zip (for
  # `phai serve install`) and a dmg (for manual drag-install). Non-fatal: a Pake
  # failure must never block the binary release above.
  desktop-app:
    needs: release-please
    if: needs.release-please.outputs.phai-cli-released == 'true'
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.phai-cli-tag }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Add both macOS targets (universal build)
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build Phai.app (universal)
        env:
          PAKE_MULTI_ARCH: "1"
        run: scripts/build-desktop-app.sh "${GITHUB_WORKSPACE}/dist-desktop"
      - name: Upload to release
        run: |
          gh release upload "${{ needs.release-please.outputs.phai-cli-tag }}" \
            dist-desktop/Phai.app.zip \
            dist-desktop/Phai.dmg \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
