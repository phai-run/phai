name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      finance-cli-released: ${{ steps.release.outputs['crates/finance-cli--release_created'] }}
      finance-cli-tag: ${{ steps.release.outputs['crates/finance-cli--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-assets:
    needs: release-please
    if: needs.release-please.outputs.finance-cli-released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            cross: false
          - runner: macos-14
            target: x86_64-apple-darwin
            cross: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.finance-cli-tag }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Add cross-compile target
        if: matrix.cross == true
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --package finance-cli ${{ matrix.cross && format('--target {0}', matrix.target) || '' }}
      - name: Package and checksum
        run: |
          BIN_DIR=${{ matrix.cross && format('target/{0}/release', matrix.target) || 'target/release' }}
          cd "$BIN_DIR"
          tar czf finance-cli-${{ matrix.target }}.tar.gz finance-cli
          shasum -a 256 finance-cli-${{ matrix.target }}.tar.gz \
            > finance-cli-${{ matrix.target }}.tar.gz.sha256
          mv finance-cli-${{ matrix.target }}.tar.gz \
             finance-cli-${{ matrix.target }}.tar.gz.sha256 \
             "${GITHUB_WORKSPACE}/"
      - name: Upload to release
        run: |
          gh release upload "${{ needs.release-please.outputs.finance-cli-tag }}" \
            finance-cli-${{ matrix.target }}.tar.gz \
            finance-cli-${{ matrix.target }}.tar.gz.sha256 \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
