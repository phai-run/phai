name: Release Please

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # For the root package (path "."), release-please-action emits outputs
      # WITHOUT a path prefix — see setPathOutput in the action source.
      phai-cli-released: ${{ steps.release.outputs.release_created }}
      phai-cli-tag: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-assets:
    needs: release-please
    if: needs.release-please.outputs.phai-cli-released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            cross: false
          - runner: macos-14
            target: x86_64-apple-darwin
            cross: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.phai-cli-tag }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Add cross-compile target
        if: matrix.cross == true
        run: rustup target add ${{ matrix.target }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build web app
        working-directory: crates/phai-cli/web
        run: pnpm install --frozen-lockfile && pnpm build
      - name: Build
        run: cargo build --release --package phai-cli ${{ matrix.cross && format('--target {0}', matrix.target) || '' }}
      - name: Package and checksum
        run: |
          BIN_DIR=${{ matrix.cross && format('target/{0}/release', matrix.target) || 'target/release' }}
          cd "$BIN_DIR"
          tar czf phai-cli-${{ matrix.target }}.tar.gz phai
          shasum -a 256 phai-cli-${{ matrix.target }}.tar.gz \
            > phai-cli-${{ matrix.target }}.tar.gz.sha256
          mv phai-cli-${{ matrix.target }}.tar.gz \
             phai-cli-${{ matrix.target }}.tar.gz.sha256 \
             "${GITHUB_WORKSPACE}/"
      - name: Upload to release
        run: |
          gh release upload "${{ needs.release-please.outputs.phai-cli-tag }}" \
            phai-cli-${{ matrix.target }}.tar.gz \
            phai-cli-${{ matrix.target }}.tar.gz.sha256 \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
